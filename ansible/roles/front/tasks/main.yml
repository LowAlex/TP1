---
- name: Run front container
  community.docker.docker_container:
    name: front
    image: "{{ dockerhub_username }}/tp-devops-front:latest"
    pull: true
    networks:
      - name: app-network
    restart_policy: unless-stopped
    state: started
  vars:
    ansible_python_interpreter: /opt/docker_venv/bin/python
