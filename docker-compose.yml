services:

  database:
    build:
      context: .
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - back-network
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "usr", "-d", "db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  backend:
    build:
      context: ./backend
    networks:
      - back-network
      - front-network
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  httpd:
    build:
      context: ./http-server
    ports:
      - "80:80"
    networks:
      - front-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped


networks:
  front-network:
  back-network:

volumes:
  db-data:
