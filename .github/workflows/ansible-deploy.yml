name: Ansible Deploy

on:
  # Déclenché automatiquement après le push des images Docker
  workflow_run:
    workflows: ["CD - Build and Push Docker Images"]
    branches:
      - main
    types:
      - completed
  # Permet aussi de déclencher manuellement depuis l'onglet Actions
  workflow_dispatch:

jobs:
  deploy:
    # Ne tourne que si le build d'images a réussi (ou en manuel)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    # L'environment "production" impose une validation manuelle
    # (à configurer dans Settings > Environments > production > Required reviewers)
    environment:
      name: production
      url: http://alexan.leblois.takima.school/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.docker

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_takima
          chmod 600 ~/.ssh/id_rsa_takima
          ssh-keyscan -H alexan.leblois.takima.school >> ~/.ssh/known_hosts

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
        run: |
          cd ansible
          ansible-playbook -i inventories/setup.yml playbook.yml
