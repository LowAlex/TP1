name: CI - Test Backend

on:
  # Run tests on every push to main and develop
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Install Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Build the app and run unit + integration test
      - name: Build and test with Maven
        run: mvn clean verify --file backend/pom.xml

      # Upload test results and coverage so sonar can use them
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-target
          path: backend/target/

  # Analyze code quality with SonarCloud (needs test results)
  sonar-analysis:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Download test results generated by test-backend
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-target
          path: backend/target/

      # Run SonarCloud analysis using existing test results
      - name: SonarCloud analysis
        run: mvn -B sonar:sonar -Dsonar.projectKey=LowAlex_TP1 -Dsonar.organization=lowalex -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }} --file backend/pom.xml
